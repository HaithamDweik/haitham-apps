              setData(d=>{
                const nd=JSON.parse(JSON.stringify(d));
                const srcDay=nd.daily[dt]||emptyDay();
                const panels2=['pool','fastDoing','scheduled','newTasks'];
                const sections=['homeBefore','toWork','fromWork','homeAfter'];
                let found=false;
                panels2.forEach(key=>{ if(found) return; const idx=(srcDay[key]||[]).findIndex(i=>i.id===item.id); if(idx>=0){ srcDay[key].splice(idx,1); found=true; } });
                sections.forEach(sec=>{ if(found) return; const idx=((srcDay.sections||{})[sec]||[]).findIndex(i=>i.id===item.id); if(idx>=0){ srcDay.sections[sec].splice(idx,1); found=true; } });
                const archiveEntry={id:uid(), text:item.text, html:item.html||"", date:todayStr(), category:item.category||"other", source:"waiting", waitingLog:item.waitingLog};
                nd.archive=[archiveEntry,...(nd.archive||[])];
                nd.daily[dt]=srcDay;
                return nd;
              });
            }}
          />
        ))
    )
  });

  const inventoryPanels = CATEGORY_KEYS.map(cat=>({
    id:"inv_"+cat, title:t.categories[cat],
    actions:<button onClick={()=>addInventoryItem(cat)} className="text-xs px-2 py-1 border rounded">{t.addInventoryItem}</button>,
    render:(cellBg)=>(<>
      {data.inventory[cat].length===0 && <div className="text-xs opacity-50 p-1">{t.inventoryEmpty}</div>}
      {data.inventory[cat].map((item,idx)=>(
        <InventoryRow key={item.id} item={item} cat={cat} cellBg={cellBg} t={t} lang={lang}
          rowIndex={idx} onDragRow={(f,to,tp)=>moveTaskAcross({inventory:cat},f,tp,to)}
          onUpdate={(it)=>updateInventoryItem(cat,it)}
          onDelete={()=>deleteInventoryItem(cat,item.id)}
          onImport={()=>importInventoryToPool(cat,item)}
          onCategoryChange={(toCat)=>{ if(toCat) moveInventoryItem(cat,toCat,item.id); }}
          highlighted={highlightTarget && highlightTarget.panelId==="inv_"+cat && highlightTarget.itemId===item.id} />
      ))}
    </>)
  }));

  // User-created custom inventory categories
  (data.customCategoryDefs||[]).forEach(def=>{
    const cat = def.id;
    const items = data.inventory[cat]||[];
    inventoryPanels.push({
      id:"inv_"+cat, title:def.name,
      actions:(
        <div className="flex gap-1">
          <button onClick={()=>addInventoryItem(cat)} className="text-xs px-2 py-1 border rounded">{t.addInventoryItem}</button>
          <button onClick={()=>deleteCustomCategory(def.id)} title="Remove" className="text-xs px-1.5 py-1 border rounded text-red-500 hover:bg-red-50">✕</button>
        </div>
      ),
      render:(cellBg)=>(<>
        {items.length===0 && <div className="text-xs opacity-50 p-1">{t.inventoryEmpty}</div>}
        {items.map((item,idx)=>(
          <InventoryRow key={item.id} item={item} cat={cat} cellBg={cellBg} t={t} lang={lang}
            rowIndex={idx} onDragRow={(f,to,tp)=>moveTaskAcross({inventory:cat},f,tp,to)}
            onUpdate={(it)=>updateInventoryItem(cat,it)}
            onDelete={()=>deleteInventoryItem(cat,item.id)}
            onImport={()=>importInventoryToPool(cat,item)}
            onCategoryChange={(toCat)=>{ if(toCat) moveInventoryItem(cat,toCat,item.id); }}
            highlighted={highlightTarget && highlightTarget.panelId==="inv_"+cat && highlightTarget.itemId===item.id} />
        ))}
      </>)
    });
  });

  const archivePanels = [{
    id:"archive", title:t.archiveTitle, actions:null,
    render:(cellBg)=>(
      data.archive.length===0 ? <div className="text-sm opacity-60 p-2">{t.archiveEmpty}</div> :
      [...data.archive].reverse().map(a=>(
        <ArchiveRow key={a.id} entry={a} cellBg={cellBg} t={t} lang={lang} onRestore={()=>restoreArchiveEntry(a.id)}
          highlighted={highlightTarget && highlightTarget.panelId==="archive" && highlightTarget.itemId===a.id} />
      ))
    )
  }];

  const dashMaxCompleted = Math.max(1,...last14.map(d=>d.count));
  const todayForDash = todayStr();

  // waiting for stats
  const waitingItems = [];
  Object.keys(data.daily).forEach(dt=>{
    ['pool','fastDoing','scheduled','newTasks'].forEach(key=>{
      (data.daily[dt][key]||[]).forEach(item=>{
        const aw=(item.waitingLog||[]).find(w=>!w.resolved);
        if(aw) waitingItems.push({item,dt,key,aw});
      });
    });
  });

  const dashboardPanels = [
    { id:"dash_today", title:t.dashToday, actions:null,
      render:()=> (
        <div className="p-3 flex flex-col gap-1">
          <div className="text-4xl font-bold text-emerald-500">{archiveCountToday}</div>
          <div className="text-xs opacity-60">{lang==="he"?"היום":"Today"} · {todayForDash}</div>
          <div className="mt-2 text-sm">
            <div className="flex justify-between py-0.5"><span>{lang==="he"?"במלאי":"In pool"}</span><span className="font-semibold">{(day.pool||[]).length}</span></div>
            <div className="flex justify-between py-0.5"><span>{lang==="he"?"מתוזמנות":"Scheduled"}</span><span className="font-semibold">{(day.scheduled||[]).length}</span></div>
            <div className="flex justify-between py-0.5"><span>{lang==="he"?"ממתינות":"Waiting"}</span><span className="font-semibold text-orange-500">{waitingItems.length}</span></div>
            <div className="flex justify-between py-0.5 border-t mt-1 font-semibold"><span>{lang==="he"?"סה\"כ בארכיון":"Total archived"}</span><span>{data.archive.length}</span></div>
          </div>
        </div>
      )},
    { id:"dash_chart", title:lang==="he"?"📊 השלמות - 14 ימים אחרונים":"📊 Completions - last 14 days", actions:null,
      render:()=>(
        <div className="p-2" style={{direction:"ltr"}}>
          <svg width="100%" viewBox={`0 0 ${completedByDay.length*36} 130`} preserveAspectRatio="none">
            {completedByDay.map((d,i)=>{
              const barH = d.count>0 ? Math.max(4, Math.round((d.count/dashMaxCompleted)*90)) : 0;
              const x = i*36+2, y=100-barH, w=30;
              return (
                <g key={d.dt}>
                  <rect x={x} y={y} width={w} height={barH} rx="3" fill={d.dt===todayForDash?"#22c55e":"#6366f1"} opacity="0.85" />
                  {d.count>0 && <text x={x+w/2} y={y-3} textAnchor="middle" fontSize="9" fill="currentColor" opacity="0.8">{d.count}</text>}
                  <text x={x+w/2} y="115" textAnchor="middle" fontSize="8" fill="currentColor" opacity="0.5">{d.label.replace(/[^\d/]/g,"").slice(0,5)}</text>
                </g>
              );
            })}
            <line x1="0" y1="100" x2={completedByDay.length*36} y2="100" stroke="currentColor" opacity="0.15" strokeWidth="1"/>
          </svg>
          <div className="flex gap-3 text-[10px] opacity-60 mt-1">
            <span>🟢 {lang==="he"?"היום":"Today"}</span>
            <span>🟣 {lang==="he"?"שאר הימים":"Other days"}</span>
          </div>
        </div>
      )},
    { id:"dash_cat", title:t.dashCat, actions:null,
      render:()=>{
        const cats = CATEGORY_KEYS.filter(c=>data.archive.filter(a=>a.category===c).length>0);
        const total = data.archive.length || 1;
        const colors = ["#6366f1","#22c55e","#f59e0b","#ef4444","#06b6d4","#ec4899","#8b5cf6","#f97316"];
        return (
          <div className="p-2" style={{direction:"ltr"}}>
            {cats.length===0 && <div className="text-xs opacity-50 p-2">{lang==="he"?"אין נתונים עדיין":"No data yet"}</div>}
            {cats.map((cat,i)=>{
              const count = data.archive.filter(a=>a.category===cat).length;
              const pct = Math.round(count/total*100);
              const color = colors[i%colors.length];
              return (
                <div key={cat} className="mb-1.5">
                  <div className="flex justify-between text-xs mb-0.5">
                    <span>{t.categories[cat]}</span>
                    <span className="font-semibold">{count} ({pct}%)</span>
                  </div>
                  <div className="h-2 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
                    <div className="h-full rounded-full" style={{width:pct+"%", backgroundColor:color}} />
                  </div>
                </div>
              );
            })}
          </div>
        );
      }},
    { id:"dash_total", title:t.dashTotal, actions:null,
      render:()=>{
        const withTime = data.archive.filter(a=>a.timeSpent>0);
        const avgTime = withTime.length ? Math.round(withTime.reduce((s,a)=>s+a.timeSpent,0)/withTime.length) : null;
        const weeks = {};
        data.archive.forEach(a=>{ const wk=a.date?.slice(0,7)||"?"; weeks[wk]=(weeks[wk]||0)+1; });
        return (
          <div className="p-2 text-sm flex flex-col gap-1.5" style={{direction:"ltr"}}>
            <div className="flex justify-between py-0.5 border-b"><span>{lang==="he"?"סה\"כ בארכיון":"Total archived"}</span><span className="font-bold text-indigo-500">{data.archive.length}</span></div>
            {avgTime!=null && <div className="flex justify-between py-0.5"><span>{lang==="he"?"זמן ביצוע ממוצע":"Avg. execution time"}</span><span className="font-semibold">{avgTime} {lang==="he"?"דק׳":"min"}</span></div>}
            <div className="text-xs opacity-60 mt-1 font-semibold">{lang==="he"?"לפי חודש":"By month:"}</div>
            {Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6).map(([mo,cnt])=>(
              <div key={mo} className="flex justify-between text-xs">
                <span>{mo}</span><span className="font-semibold">{cnt}</span>
              </div>
            ))}
          </div>
        );
      }},
    { id:"dash_waiting", title:`⏳ ${lang==="he"?"ממתינות לתשובה":"Waiting for reply"} (${waitingItems.length})`, actions:null,
      render:()=>(
        <div className="p-1 text-xs" style={{direction:"ltr"}}>
          {waitingItems.length===0 && <div className="opacity-50 p-2">{lang==="he"?"אין משימות ממתינות":"No waiting tasks"}</div>}
          {waitingItems.map(({item,dt,key,aw},i)=>{
            const overdue = aw.expectedDate<todayForDash;
            return (
              <div key={item.id+i} className={`flex items-center gap-2 border-b border-slate-200 dark:border-slate-700 py-1 ${overdue?"bg-red-50 dark:bg-red-900/20":""}`}>
                <span className={`font-bold flex-shrink-0 ${overdue?"text-red-500":"text-orange-500"}`}>{overdue?"🔴":"⏳"}</span>
                <span className="flex-1 truncate">{item.text||"—"}</span>
                <span className="opacity-70 flex-shrink-0">{aw.expectedDate}</span>
                <button onClick={()=>{ setDate(dt); setTab("daily"); }} className="px-1.5 py-0.5 border rounded hover:bg-black/5 flex-shrink-0">{lang==="he"?"עבור":"Go"}</button>
              </div>
            );
          })}
        </div>
      )}
  ];

  const TAB_PANELS = { daily: dailyPanels, inventory: inventoryPanels, archive: archivePanels, dashboard: dashboardPanels };

  /* ── Sync status display ── */
  const syncIcon = odStatus==="saving" || syncStatus==="saving" ? "↻"
    : odStatus==="error" || syncStatus==="error" ? "⚠"
    : odStatus==="connected" ? "☁"
    : "💾"; // local only
  const syncClass = (odStatus==="saving"||syncStatus==="saving") ? "bg-amber-100 dark:bg-amber-900/40 border-amber-400 animate-pulse"
    : (odStatus==="error"||syncStatus==="error") ? "bg-red-100 dark:bg-red-900/40 border-red-400 cursor-pointer"
    : odStatus==="connected" ? "bg-emerald-100 dark:bg-emerald-900/40 border-emerald-400"
    : "bg-slate-100 dark:bg-slate-800 border-slate-400";
  const onSyncClick = () => {
    if(odStatus==="error" && msalRef.current) odLoadFromOneDrive(msalRef.current);
    else if(!odClientId) setShowOdSettings(true);
  };

  const odIcon = !odClientId ? "🔗" : odStatus==="connected" ? "🟢" : odStatus==="connecting" ? "🔄" : odStatus==="error" ? "🔴" : "⚪";
  const odTitle = !odClientId ? (lang==="he"?"הגדר OneDrive":"Setup OneDrive sync") : odStatus==="connected" ? `OneDrive: ${odAccount?.name||odAccount?.username||"connected"}` : odStatus==="connecting" ? (lang==="he"?"מתחבר ל-OneDrive...":"Connecting to OneDrive...") : (lang==="he"?"שגיאת OneDrive":"OneDrive error");
  const odLabel = !odClientId ? "OneDrive" : odStatus==="connected" ? ((odAccount?.name||"").split(" ")[0]||"Connected") : odStatus==="connecting" ? "..." : "Error";

  const TAB_ICONS = {daily:"📅", inventory:"🗃", archive:"📦", dashboard:"📊"};

  return (
    <div dir={dir} className={dark?"dark":""}>
      <div className={`min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-950 dark:to-slate-900 dark:text-slate-100 text-slate-800 transition-colors ${isMobile?"pb-20":""}`}>

        {/* ── DESKTOP/TABLET HEADER ── */}
        {!isMobile && (
          <div className="sticky top-0 z-10 backdrop-blur bg-white/70 dark:bg-slate-900/70 border-b border-slate-300 dark:border-slate-700 px-3 py-2 flex flex-wrap items-center gap-2 justify-between">
            <h1 className="text-lg font-bold">{t.appTitle}</h1>
            <div className="flex items-center gap-2 flex-wrap">
              <div className="relative">
                <button onClick={()=>setShowSearch(s=>!s)} title={t.search} className={`p-2 border rounded text-base ${showSearch?"bg-indigo-100 dark:bg-indigo-900/40 border-indigo-400":""}`}>🔍</button>
                {showSearch && (
                  <div className="absolute z-[999] mt-1 w-72" style={{[lang==="he"?"right":"left"]:0}}>
                    <input autoFocus value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} placeholder={t.searchPlaceholder}
                      className="w-full border border-slate-300 dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-800" />
                    {searchQuery.trim().length>=2 && (
                      <div className="mt-1 max-h-72 overflow-y-auto bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded shadow-xl text-sm">
                        {searchResults.length===0 && <div className="p-2 opacity-60 text-xs">{t.noResults}</div>}
                        {searchResults.map((r,i)=>(
                          <button key={i} onClick={()=>goToResult(r)} className="w-full text-left px-2 py-1.5 border-b border-slate-100 dark:border-slate-700 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 flex flex-col">
                            <span className="truncate">{r.text||"—"}</span><span className="text-[11px] opacity-60">{r.location}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
              <input type="date" value={date} onChange={(e)=>setDate(e.target.value)} className="bg-transparent border border-slate-300 dark:border-slate-600 rounded px-2 py-1 text-sm" />
              <button onClick={()=>setDate(addDays(date,-1))} className="px-2.5 py-1.5 border rounded text-sm">‹</button>
              <button onClick={()=>setDate(todayStr())} className="px-2.5 py-1.5 border rounded text-sm">{t.today}</button>
              <button onClick={()=>setDate(addDays(date,1))} className="px-2.5 py-1.5 border rounded text-sm">›</button>
              <select value={lang} onChange={(e)=>setSettings({lang:e.target.value})} className="bg-transparent border border-slate-300 dark:border-slate-600 rounded px-2 py-1 text-sm">
                <option value="en">EN</option><option value="he">עברית</option><option value="ar">العربية</option>
              </select>
              <button onClick={()=>setSettings({dark:!dark})} className="p-2 border rounded text-base">{dark?"☀":"🌙"}</button>
              <div className="relative flex">
                <button onClick={undo} disabled={history.length===0} className={`px-2 py-1.5 border-l border-y rounded-l text-base ${history.length===0?"opacity-30":""}`}>↶</button>
                <button onClick={()=>{ setShowRedoMenu(false); setShowUndoMenu(o=>!o); }} disabled={history.length===0} className={`px-1 py-1.5 border rounded-r text-[10px] border-l-0 ${history.length===0?"opacity-30":""}`}>▾</button>
                {showUndoMenu && createPortal(<div className="fixed inset-0 z-[998]" onClick={()=>setShowUndoMenu(false)}><div onClick={e=>e.stopPropagation()} className="absolute bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg shadow-xl text-xs overflow-hidden" style={{top:50,left:8,minWidth:220,maxHeight:280,overflowY:"auto"}}><div className="px-3 py-1.5 font-semibold border-b opacity-60">{lang==="he"?"פעולות לביטול":"Actions to undo"}</div>{[...history].reverse().slice(0,15).map((snap,i)=>{ const after=i===0?dataRef.current:[...history].reverse()[i-1]; return(<button key={i} onClick={()=>{ for(let x=0;x<=i;x++) undo(); setShowUndoMenu(false); }} className="block w-full text-left px-3 py-1.5 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 border-b border-slate-100 dark:border-slate-700">{diffLabel(snap,after)}</button>); })}</div></div>,document.body)}
              </div>
              <div className="relative flex">
                <button onClick={redo} disabled={redoStack.length===0} className={`px-2 py-1.5 border-l border-y rounded-l text-base ${redoStack.length===0?"opacity-30":""}`}>↷</button>
                <button onClick={()=>{ setShowUndoMenu(false); setShowRedoMenu(o=>!o); }} disabled={redoStack.length===0} className={`px-1 py-1.5 border rounded-r text-[10px] border-l-0 ${redoStack.length===0?"opacity-30":""}`}>▾</button>
                {showRedoMenu && createPortal(<div className="fixed inset-0 z-[998]" onClick={()=>setShowRedoMenu(false)}><div onClick={e=>e.stopPropagation()} className="absolute bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg shadow-xl text-xs overflow-hidden" style={{top:50,left:80,minWidth:220,maxHeight:280,overflowY:"auto"}}><div className="px-3 py-1.5 font-semibold border-b opacity-60">{lang==="he"?"פעולות לחזרה":"Actions to redo"}</div>{[...redoStack].reverse().slice(0,15).map((snap,i)=>{ const before=i===0?dataRef.current:[...redoStack].reverse()[i-1]; return(<button key={i} onClick={()=>{ for(let x=0;x<=i;x++) redo(); setShowRedoMenu(false); }} className="block w-full text-left px-3 py-1.5 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 border-b border-slate-100 dark:border-slate-700">{diffLabel(before,snap)}</button>); })}</div></div>,document.body)}
              </div>
              {/* Unified sync status indicator */}
              <span onClick={onSyncClick} title={odTitle} className={`flex items-center justify-center w-8 h-8 rounded-full border text-base cursor-pointer ${syncClass}`}>{syncIcon}</span>
              {/* OneDrive button */}
              <div className="flex items-center gap-1 border-l pl-2 ml-1">
                <button onClick={()=>setShowOdSettings(true)} title={odTitle} className="flex items-center gap-1 px-2 py-1.5 border rounded text-xs hover:bg-slate-50 dark:hover:bg-slate-800">
                  <span>{odIcon}</span>
                  <span className="hidden xl:inline">OneDrive</span>
                </button>
                {odClientId && odStatus!=="connected" && (
                  <button onClick={odConnectLogin} className="text-xs px-2 py-1.5 border rounded bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300">
                    {lang==="he"?"התחבר":"Sign in"}
                  </button>
                )}
                {odClientId && odStatus==="connected" && (
                  <button onClick={odDisconnect} className="text-xs px-2 py-1.5 border rounded opacity-60 hover:opacity-100">
                    {lang==="he"?"נתק":"Sign out"}
                  </button>
                )}
              </div>
              {/* Export / Import JSON */}
              <div className="flex items-center gap-1 border-l pl-2 ml-1">
                <button onClick={()=>exportJsonFile(data)} title="Export data to JSON file" className="text-xs px-2 py-1.5 border rounded hover:bg-slate-50 dark:hover:bg-slate-800">⬇ JSON</button>
                <button onClick={()=>importJsonFile(parsed=>{ const nd=normalizeData(parsed); setData(nd); })} title="Import data from JSON file" className="text-xs px-2 py-1.5 border rounded hover:bg-slate-50 dark:hover:bg-slate-800">⬆ JSON</button>
              </div>
            </div>
          </div>
        )}

        {/* ── OneDrive Settings Modal ── */}
        {showOdSettings && (
          <OneDriveSettingsModal lang={lang}
            currentClientId={odClientId}
            onClose={()=>setShowOdSettings(false)}
            onClientIdSave={(cid)=>{
              setOdClientId(cid);
              if(cid){ setOdStatus("connecting"); }
              else { setOdStatus("idle"); setOdAccount(null); msalRef.current=null; }
            }} />
        )}

        {/* ── MOBILE HEADER ── */}
        {isMobile && (
          <div className="sticky top-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-700 px-3 py-2">
            <div className="flex items-center justify-between gap-2">
              <span className="font-bold text-base truncate">{t.appTitle}</span>
              <div className="flex items-center gap-1.5">
                <button onClick={()=>setDate(addDays(date,-1))} className="w-9 h-9 flex items-center justify-center border rounded-lg text-lg">‹</button>
                <button onClick={()=>setDate(todayStr())} className="px-2 h-9 border rounded-lg text-xs font-semibold">{date===todayStr()?"⬤":date.slice(5)}</button>
                <button onClick={()=>setDate(addDays(date,1))} className="w-9 h-9 flex items-center justify-center border rounded-lg text-lg">›</button>
                <button onClick={()=>setShowSearch(s=>!s)} className={`w-9 h-9 flex items-center justify-center border rounded-lg text-lg ${showSearch?"bg-indigo-100 border-indigo-400":""}`}>🔍</button>
                <span onClick={onSyncClick} className={`w-9 h-9 flex items-center justify-center rounded-full border text-base ${syncClass}`}>{syncIcon}</span>
                <button onClick={()=>setMobileMenuOpen(o=>!o)} className="w-9 h-9 flex items-center justify-center border rounded-lg text-base">☰</button>
              </div>
            </div>
            {showSearch && (
              <div className="mt-2">
                <input autoFocus value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} placeholder={t.searchPlaceholder}
                  className="w-full border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-800" />
                {searchQuery.trim().length>=2 && (
                  <div className="mt-1 max-h-60 overflow-y-auto bg-white dark:bg-slate-800 border border-slate-300 rounded-lg shadow-xl text-sm">
                    {searchResults.length===0 && <div className="p-3 opacity-60 text-xs">{t.noResults}</div>}
                    {searchResults.map((r,i)=>(
                      <button key={i} onClick={()=>goToResult(r)} className="w-full text-left px-3 py-2 border-b border-slate-100 dark:border-slate-700 hover:bg-indigo-50 flex flex-col">
                        <span className="truncate">{r.text||"—"}</span><span className="text-[11px] opacity-60">{r.location}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── MOBILE HAMBURGER MENU ── */}
        {isMobile && mobileMenuOpen && createPortal(
          <div className="fixed inset-0 z-[999]" onClick={()=>setMobileMenuOpen(false)}>
            <div onClick={e=>e.stopPropagation()} className="absolute top-0 right-0 w-72 h-full bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col p-4 gap-4">
              <div className="flex justify-between items-center">
                <span className="font-bold">{t.appTitle}</span>
                <button onClick={()=>setMobileMenuOpen(false)} className="p-2 text-xl">✕</button>
              </div>
              <div className="flex flex-col gap-2 text-sm">
                <div className="flex items-center gap-2">
                  <span className="opacity-60 w-16">📅 {lang==="he"?"תאריך":"Date"}:</span>
                  <input type="date" value={date} onChange={(e)=>{ setDate(e.target.value); setMobileMenuOpen(false); }} className="flex-1 border rounded px-2 py-1 bg-transparent text-sm" />
                </div>
                <div className="flex items-center gap-2">
                  <span className="opacity-60 w-16">🌐 {lang==="he"?"שפה":"Lang"}:</span>
                  <select value={lang} onChange={(e)=>setSettings({lang:e.target.value})} className="flex-1 border rounded px-2 py-1 bg-transparent text-sm">
                    <option value="en">EN</option><option value="he">עברית</option><option value="ar">العربية</option>
                  </select>
                </div>
                <div className="flex items-center justify-between">
                  <span className="opacity-60">🌙 {lang==="he"?"מצב כהה":"Dark mode"}</span>
                  <button onClick={()=>setSettings({dark:!dark})} className="p-2 border rounded">{dark?"☀":"🌙"}</button>
                </div>
                <div className="flex items-center gap-2 pt-2 border-t">
                  <button onClick={()=>{ undo(); }} disabled={history.length===0} className={`flex-1 py-2 border rounded ${history.length===0?"opacity-30":""}`}>↶ {lang==="he"?"בטל":"Undo"}</button>
                  <button onClick={()=>{ redo(); }} disabled={redoStack.length===0} className={`flex-1 py-2 border rounded ${redoStack.length===0?"opacity-30":""}`}>↷ {lang==="he"?"חזור":"Redo"}</button>
                </div>
                {/* OneDrive in mobile menu */}
                <div className="flex flex-col gap-2 pt-2 border-t text-xs">
                  <div className="font-semibold opacity-80">🔗 OneDrive Sync {odIcon}</div>
                  {!odClientId && <button onClick={()=>{ setMobileMenuOpen(false); setShowOdSettings(true); }} className="py-2 border rounded text-indigo-600">{lang==="he"?"הגדר OneDrive":"Setup OneDrive"}</button>}
                  {odClientId && odStatus!=="connected" && <button onClick={()=>{ setMobileMenuOpen(false); odConnectLogin(); }} className="py-2 border rounded bg-blue-50 text-blue-700">{lang==="he"?"התחבר ל-OneDrive":"Connect to OneDrive"}</button>}
                  {odClientId && odStatus==="connected" && <div className="opacity-60 truncate">✅ {odAccount?.name||odAccount?.username||"connected"}</div>}
                </div>
                {/* Export / Import */}
                <div className="flex gap-2 pt-2 border-t">
                  <button onClick={()=>{ exportJsonFile(data); setMobileMenuOpen(false); }} className="flex-1 py-2 border rounded text-xs">⬇ {lang==="he"?"ייצא JSON":"Export JSON"}</button>
                  <button onClick={()=>{ importJsonFile(parsed=>{ const nd=normalizeData(parsed); setData(nd); }); setMobileMenuOpen(false); }} className="flex-1 py-2 border rounded text-xs">⬆ {lang==="he"?"ייבא JSON":"Import JSON"}</button>
                </div>
                {user && (
                  <div className="flex flex-col gap-2 pt-2 border-t text-xs">
                    <div className="opacity-60 truncate">☁ {user.email}</div>
                    <button onClick={()=>{ odDisconnect(); setMobileMenuOpen(false); }} className="py-2 border rounded text-red-600 dark:text-red-400">{lang==="he"?"נתק OneDrive":"Disconnect OneDrive"}</button>
                  </div>
                )}
              </div>
            </div>
          </div>, document.body)}

        {/* ── TABS (desktop/tablet top, mobile = bottom nav) ── */}
        {!isMobile && (
          <div className="flex items-center gap-1 px-3 pt-2 flex-wrap">
            {["daily","inventory","archive","dashboard"].map(key=>(
              <button key={key} onClick={()=>{ setTab(key); setFocusPanels(new Set()); }} className={`px-3 py-1.5 rounded-t-lg text-sm font-medium border-b-2 ${tab===key?"border-indigo-500 text-indigo-600 dark:text-indigo-300":"border-transparent opacity-60"}`}>{t.tabs[key]}</button>
            ))}
            {/* FOCUS ON button */}
            {(tab==="daily"||tab==="inventory") && (
              <div className="relative ml-2">
                <button onClick={()=>setShowFocusMenu(o=>!o)}
                  className={`px-3 py-1.5 rounded-lg text-sm font-medium border ${focusPanels.size>0?"bg-indigo-600 text-white border-indigo-600":"border-indigo-300 text-indigo-600 dark:text-indigo-300 hover:bg-indigo-50 dark:hover:bg-indigo-900/30"}`}>
                  🎯 {lang==="he"?"מיקוד":"Focus On"}{focusPanels.size>0?` (${focusPanels.size})`:""}
                </button>
                {showFocusMenu && createPortal(
                  <div className="fixed inset-0 z-[998]" onClick={()=>setShowFocusMenu(false)}>
                    <div onClick={e=>e.stopPropagation()} className="absolute bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-xl shadow-2xl p-3 text-sm"
                      style={{top:52, left:8, minWidth:240}}>
                      <div className="font-semibold mb-2 opacity-70">{lang==="he"?"בחר חלוניות להצגה בלעדית:":"Select panels to focus on:"}</div>
                      {(tab==="daily"?dailyPanels:inventoryPanels).map(p=>(
                        <label key={p.id} className="flex items-center gap-2 py-1.5 px-2 rounded hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer">
                          <input type="checkbox" checked={focusPanels.has(p.id)}
                            onChange={()=>setFocusPanels(prev=>{ const n=new Set(prev); if(n.has(p.id)) n.delete(p.id); else n.add(p.id); return n; })} />
                          <span>{typeof p.title==="string"?p.title:p.id}</span>
                        </label>
                      ))}
                      <div className="flex gap-2 mt-2 pt-2 border-t">
                        <button onClick={()=>{ setFocusPanels(new Set()); setShowFocusMenu(false); }} className="flex-1 py-1 border rounded text-xs">{lang==="he"?"הצג הכל":"Show all"}</button>
                        <button onClick={()=>setShowFocusMenu(false)} className="flex-1 py-1 bg-indigo-600 text-white rounded text-xs">{lang==="he"?"אישור":"Apply"}</button>
                      </div>
                    </div>
                  </div>, document.body)}
              </div>
            )}
            {(tab==="daily"||tab==="inventory") && (
              <AddPanelButton tab={tab} onAdd={(name)=>{ tab==="daily"?addCustomSection(name):addCustomCategory(name); }} t={t} />
            )}
            <button onClick={()=>{ setData(d=>{ const order=d.layout.order[tab]||[]; const sizes={...d.layout.sizes}; const computed=computeDefaultPositions(order,sizes); const positions={...d.layout.positions}; order.forEach(id=>{ positions[id]=computed[id]; }); return {...d,layout:{...d.layout,positions}}; }); }} title={lang==="he"?"אפס מיקום חלוניות":"Reset panel layout"} className="text-[10px] px-2 py-1 border rounded opacity-50 hover:opacity-100 ml-1">⊞ {lang==="he"?"אפס":"Reset"}</button>
          </div>
        )}

        {/* ── MAIN CONTENT ── */}
        <div className={isMobile?"px-2 py-2":"p-3"}>
          <PanelGrid tab={tab} panels={TAB_PANELS[tab]} layout={layout} onResize={onResize} onColor={onColor} onMovePanel={onMovePanel} onZShift={onZShift} onMarqueeSelect={onMarqueeSelect} onSelectAll={onSelectAll} focusPanels={focusPanels.size>0?focusPanels:null} device={device} t={t} />
        </div>

        {/* ── MOBILE BOTTOM NAV ── */}
        {isMobile && (
          <nav className="fixed bottom-0 left-0 right-0 z-20 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 flex safe-bottom">
            {["daily","inventory","archive","dashboard"].map(key=>(
              <button key={key} onClick={()=>setTab(key)} className={`flex-1 flex flex-col items-center py-2 gap-0.5 text-[10px] transition-colors ${tab===key?"text-indigo-600 dark:text-indigo-400":"opacity-50"}`}>
                <span className="text-xl">{TAB_ICONS[key]}</span>
                <span>{t.tabs[key]}</span>
              </button>
            ))}
          </nav>
        )}

        <div className="fixed bottom-1 right-2 text-[10px] opacity-40 select-none pointer-events-none" style={{direction:"ltr"}}>{APP_BUILD}</div>
      </div>
    </div>
  );

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
