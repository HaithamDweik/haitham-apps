const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const todayStr = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); };
const addDays = (dateStr, n) => { const d = new Date(dateStr+"T00:00:00"); d.setDate(d.getDate()+n); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const emptyDay = () => ({ pool:[], fastDoing:[], scheduled:[], newTasks:[], sections:{homeBefore:[],toWork:[],fromWork:[],homeAfter:[]}, custom:{} });

function escapeHtml(s){
  return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ---------------- diff-label for undo/redo history ---------------- */
const PANEL_LABELS = { pool:"Pool", fastDoing:"Fast Doing", scheduled:"Scheduled", newTasks:"New Tasks",
  homeBefore:"Home Before", toWork:"To Work", fromWork:"From Work", homeAfter:"Home After" };
function diffLabel(before, after){
  if(!before || !after) return "Action";
  const s = JSON.stringify;
  if(s(before.settings)!==s(after.settings)) return "⚙ Settings";
  if(s(before.layout)!==s(after.layout)) return "🎨 Layout / colors";
  if(s(before.archive)!==s(after.archive)) return "📦 Archive";
  if(s(before.inventory)!==s(after.inventory)) return "🗃 Inventory";
  const dates = new Set([...Object.keys(before.daily||{}), ...Object.keys(after.daily||{})]);
  for(const dt of Array.from(dates).sort().reverse()){
    const bd = before.daily?.[dt], ad = after.daily?.[dt];
    if(s(bd)===s(ad)) continue;
    for(const k of ['pool','fastDoing','scheduled','newTasks']){
      const bl=bd?.[k]||[], al=ad?.[k]||[];
      if(s(bl)!==s(al)){
        const pl = PANEL_LABELS[k]||k;
        if(al.length>bl.length) return `➕ Task in ${pl} (${dt})`;
        if(al.length<bl.length) return `🗑 Task from ${pl} (${dt})`;
        return `✏ Edit in ${pl} (${dt})`;
      }
    }
    for(const k of ['homeBefore','toWork','fromWork','homeAfter']){
      const bl=(bd?.sections?.[k])||[], al=(ad?.sections?.[k])||[];
      if(s(bl)!==s(al)){
        const pl = PANEL_LABELS[k]||k;
        if(al.length>bl.length) return `➕ Task in ${pl} (${dt})`;
        if(al.length<bl.length) return `🗑 Task from ${pl} (${dt})`;
        return `✏ Edit in ${pl} (${dt})`;
      }
    }
    return `📅 Daily (${dt})`;
  }
  return "Action";
}

/* ---------------- global search across the whole app ---------------- */
function searchAll(data, query, t){
  const q = (query||"").trim().toLowerCase();
  if(q.length<2) return [];
  const results = [];
  Object.keys(data.daily||{}).sort().forEach(dt=>{
    const day = data.daily[dt];
    ["pool","fastDoing","scheduled","newTasks"].forEach(key=>{
      (day[key]||[]).forEach(item=>{
        if((item.text||"").toLowerCase().includes(q)) results.push({tabTarget:"daily", date:dt, panelId:key, itemId:item.id, text:item.text, location:`${t[key]} · ${dt}`});
      });
    });
    ["homeBefore","toWork","fromWork","homeAfter"].forEach(key=>{
      ((day.sections&&day.sections[key])||[]).forEach(item=>{
        if((item.text||"").toLowerCase().includes(q)) results.push({tabTarget:"daily", date:dt, panelId:key, itemId:item.id, text:item.text, location:`${t[key]} · ${dt}`});
      });
    });
  });
  CATEGORY_KEYS.forEach(cat=>{
    ((data.inventory&&data.inventory[cat])||[]).forEach(item=>{
      if((item.text||"").toLowerCase().includes(q)) results.push({tabTarget:"inventory", panelId:"inv_"+cat, itemId:item.id, text:item.text, location:t.categories[cat]});
    });
  });
  (data.archive||[]).forEach(entry=>{
    if((entry.text||"").toLowerCase().includes(q)) results.push({tabTarget:"archive", panelId:"archive", itemId:entry.id, text:entry.text, location:`${t.archiveTitle} · ${entry.date}`});
  });
  return results.slice(0,30);
}


function hexToRgb(hex){
  hex = (hex||"").replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  if(hex.length!==6) return null;
  const num = parseInt(hex,16);
  if(isNaN(num)) return null;
  return [(num>>16)&255,(num>>8)&255,num&255];
}
function luminance(hex){
  const rgb = hexToRgb(hex);
  if(!rgb) return 1;
  const [r,g,b] = rgb.map(c=>{ c/=255; return c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4); });
  return 0.2126*r+0.7152*g+0.0722*b;
}
function contrastColor(bgHex){
  return luminance(bgHex) > 0.55 ? "#000000" : "#ffffff";
}
function effectiveTextColor(color, bg){
  if(!color) return bg ? contrastColor(bg) : undefined;
  if(!bg) return color;
  const lc = luminance(color), lb = luminance(bg);
  if(Math.abs(lc-lb) < 0.35) return contrastColor(bg);
  return color;
}

const DEFAULT_ORDER = {
  daily: ["pool","scheduled","fastDoing","homeBefore","toWork","newTasks","fromWork","homeAfter","waitingForList"],
  inventory: CATEGORY_KEYS.map(c=>"inv_"+c),
  archive: ["archive"],
  dashboard: ["dash_today","dash_total","dash_cat","dash_chart","dash_waiting"]
};
function computeDefaultSizes(){
  const W = Math.max(320, (typeof window!=="undefined"?window.innerWidth:1200) - 48);
  const wide = Math.floor(W*0.49);
  const quarter = Math.floor(W*0.235);
  const full = Math.floor(W*0.98);
  return {
    pool:{w:wide,h:300}, scheduled:{w:wide,h:300},
    fastDoing:{w:wide,h:220}, homeBefore:{w:quarter,h:220}, toWork:{w:quarter,h:220},
    newTasks:{w:wide,h:220}, fromWork:{w:quarter,h:220}, homeAfter:{w:quarter,h:220},
    waitingForList:{w:full,h:200},
    dash_today:{w:quarter,h:200}, dash_total:{w:quarter,h:200}, dash_cat:{w:quarter,h:300},
    dash_chart:{w:wide,h:300}, dash_waiting:{w:wide,h:200}
  };
}
function computeDefaultPositions(order, sizes){
  const W = Math.max(320, (typeof window!=="undefined"?window.innerWidth:1200) - 48);
  const gap = 12;
  let x=0, y=0, rowH=0;
  const positions = {};
  order.forEach(id=>{
    const sz = sizes[id] || {w:360,h:340};
    if(x>0 && x+sz.w>W){ x=0; y+=rowH+gap; rowH=0; }
    positions[id] = {x,y};
    x += sz.w+gap;
    rowH = Math.max(rowH, sz.h);
  });
  return positions;
}
const defaultData = () => {
  const sizes = computeDefaultSizes();
  const positions = {};
  Object.keys(DEFAULT_ORDER).forEach(tab=>{ Object.assign(positions, computeDefaultPositions(DEFAULT_ORDER[tab], sizes)); });
  return {
    daily: { [todayStr()]: emptyDay() },
    inventory: CATEGORY_KEYS.reduce((a,k)=>{a[k]=[];return a;},{}),
    archive: [],
    settings: { lang:"he", dark:true },
    customSectionDefs: [],
    customCategoryDefs: [],
    layout: { order: JSON.parse(JSON.stringify(DEFAULT_ORDER)), sizes, positions, zIndex: {}, colors: {} }

/* ── Graph API helpers ── */
async function graphGet(token, path){
  const r = await fetch(`${GRAPH_BASE}${path}`, { headers:{ Authorization:`Bearer ${token}` } });
  if(r.status===404) return null;
  if(!r.ok) throw new Error(`Graph GET ${r.status}: ${await r.text()}`);
  return r.json();
}
async function graphPut(token, path, body){
  const r = await fetch(`${GRAPH_BASE}${path}`, {
    method:"PUT",
    headers:{ Authorization:`Bearer ${token}`, "Content-Type":"application/json" },
    body: JSON.stringify(body, null, 2)
  });
  if(!r.ok) throw new Error(`Graph PUT ${r.status}: ${await r.text()}`);
  return r;
}

const OD_SCOPES = ["Files.ReadWrite.AppFolder","User.Read"];

function buildMsal(clientId){
  if(!clientId || typeof msal==="undefined") return null;
  try {
    return new msal.PublicClientApplication({
      auth: { clientId, authority:"https://login.microsoftonline.com/common",
              redirectUri: window.location.href.split("?")[0].split("#")[0] },
      cache: { cacheLocation:"localStorage", storeAuthStateInCookie:true }
    });
  } catch(e){ console.warn("MSAL:",e); return null; }
}
async function odGetToken(instance){
  if(!instance) return null;
  const accounts = instance.getAllAccounts();
  if(!accounts.length) return null;
  try {
    const r = await instance.acquireTokenSilent({ scopes:OD_SCOPES, account:accounts[0] });
    return r.accessToken;
  } catch {
    try { const r = await instance.acquireTokenPopup({scopes:OD_SCOPES}); return r.accessToken; }
    catch(e){ console.error("Token error:",e); return null; }
  }
}

function exportJsonFile(data, filename){
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download=filename||`daily-schedule-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importJsonFile(onData){
  const inp = document.createElement("input");
  inp.type="file"; inp.accept=".json";
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{ try{onData(JSON.parse(ev.target.result));}catch(err){alert("Invalid JSON: "+err.message);} };
    r.readAsText(f);
  };
  inp.click();
}

/* ---------------- merge two data snapshots (for multi-device sync) ---------------- */
function mergeListsByID(a, b){
  const a_ = Array.isArray(a)?a:[], b_ = Array.isArray(b)?b:[];
  const map = new Map();
  b_.forEach(it=>map.set(it.id,it));
  a_.forEach(it=>map.set(it.id,it)); // local (a) wins for shared ids, new ones appended
  return Array.from(map.values());
}
function mergeDay(a, b){
  a = a || emptyDay(); b = b || emptyDay();
  const sections = {};
  ["homeBefore","toWork","fromWork","homeAfter"].forEach(k=>{ sections[k] = mergeListsByID(a.sections&&a.sections[k], b.sections&&b.sections[k]); });
  return {
    pool: mergeListsByID(a.pool, b.pool),
    fastDoing: mergeListsByID(a.fastDoing, b.fastDoing),
    scheduled: mergeListsByID(a.scheduled, b.scheduled),
    newTasks: mergeListsByID(a.newTasks, b.newTasks),
    sections
  };
}
function mergeData(local, remote){
  const dailyDates = new Set([...Object.keys(local.daily||{}), ...Object.keys(remote.daily||{})]);
  const daily = {};
  dailyDates.forEach(dt=>{ daily[dt] = mergeDay(local.daily[dt], remote.daily[dt]); });

  const invCats = new Set([...Object.keys(local.inventory||{}), ...Object.keys(remote.inventory||{})]);
  const inventory = {};
  invCats.forEach(c=>{ inventory[c] = mergeListsByID(local.inventory&&local.inventory[c], remote.inventory&&remote.inventory[c]); });

  const archive = mergeListsByID(local.archive, remote.archive);

  const layout = {
    order: { ...(remote.layout&&remote.layout.order), ...(local.layout&&local.layout.order) },
    sizes: { ...(remote.layout&&remote.layout.sizes), ...(local.layout&&local.layout.sizes) },
    positions: { ...(remote.layout&&remote.layout.positions), ...(local.layout&&local.layout.positions) },
    zIndex: { ...(remote.layout&&remote.layout.zIndex), ...(local.layout&&local.layout.zIndex) },
    colors: { ...(remote.layout&&remote.layout.colors), ...(local.layout&&local.layout.colors) }
  };

  return { daily, inventory, archive, layout, settings: { ...(remote.settings), ...(local.settings) } };
}


function normalizeData(parsed){
  let d = defaultData();
  if(parsed){
    d = { ...d, ...parsed, settings:{...d.settings,...(parsed.settings||{})}, inventory:{...d.inventory, ...(parsed.inventory||{})}, customSectionDefs: parsed.customSectionDefs || [], customCategoryDefs: parsed.customCategoryDefs || [] };
    const lay = parsed.layout || {};
    d.layout = { order:{...d.layout.order, ...(lay.order||{})}, sizes:{...(lay.sizes||{})}, positions:{...(lay.positions||{})}, zIndex:{...(lay.zIndex||{})}, colors:{...(lay.colors||{})} };
    const defSizes = computeDefaultSizes();
    Object.keys(DEFAULT_ORDER).forEach(tab=>{
      const existing = d.layout.order[tab] || [];
      const missing = DEFAULT_ORDER[tab].filter(id=>!existing.includes(id));
      d.layout.order[tab] = [...existing.filter(id=>DEFAULT_ORDER[tab].includes(id)), ...missing];
      d.layout.order[tab].forEach(id=>{
        if(!d.layout.sizes[id]) d.layout.sizes[id] = defSizes[id] || {w:360,h:340};
      });
      // Detect & reset positions that are clearly off-screen (cross-tab overlap bug from older builds)
      const W_MAX = (typeof window!=="undefined"?window.innerWidth:1400)*6;
      const H_MAX = 30000;
      const corrupted = d.layout.order[tab].filter(id=>{
        const p = d.layout.positions[id];
        return p && (p.x>W_MAX || p.y>H_MAX || p.x<-200 || p.y<-200);
      });
      if(corrupted.length){
        const computed = computeDefaultPositions(d.layout.order[tab], d.layout.sizes);
        d.layout.order[tab].forEach(id=>{ d.layout.positions[id] = computed[id]; });
      } else {
        const missingPos = d.layout.order[tab].filter(id=>!d.layout.positions[id]);
        if(missingPos.length){
          const computed = computeDefaultPositions(d.layout.order[tab], d.layout.sizes);
          missingPos.forEach(id=>{ d.layout.positions[id] = computed[id]; });
        }
      }
    });
  }
  return d;
}

function RichTextBox({ item, onChange, cellBg, dir, t, autoFocus }) {
  const ref = useRef(null);
  const [palette, setPalette] = useState(null);
  const style = item.style || {};
  const lastEmittedRef = useRef(null); // track what WE last sent via onChange

  // On new item id: set DOM and optionally focus
  useEffect(()=>{
    if(ref.current){
      const html = item.html || escapeHtml(item.text) || "";
      ref.current.innerHTML = html;
      lastEmittedRef.current = html;
      if(autoFocus) ref.current.focus();
    }
    // eslint-disable-next-line
  }, [item.id]);

  // Sync when item.html changes externally (undo/redo/cross-device sync)
  // Uses lastEmittedRef to distinguish external updates from our own typing
  useEffect(()=>{
    if(!ref.current) return;
    const expected = item.html || escapeHtml(item.text) || "";
    // If this matches what we last emitted, it's our own change reflected back - skip
    if(lastEmittedRef.current === expected) return;
    // It's an external change (undo/redo/sync) → update the DOM
    const wasFocused = document.activeElement === ref.current;
    ref.current.innerHTML = expected;
    lastEmittedRef.current = expected;
    if(wasFocused) ref.current.focus(); // restore focus if they were in it
  }, [item.html, item.text]);

  const handleInput = () => {
    const el = ref.current;
    if(!el) return;
    lastEmittedRef.current = el.innerHTML;
    onChange({ html: el.innerHTML, text: el.innerText });
  };

  const checkSelection = () => {
    const sel = window.getSelection();
    if(sel && sel.toString().length>0 && ref.current && sel.anchorNode && ref.current.contains(sel.anchorNode)){
      const rect = sel.getRangeAt(0).getBoundingClientRect();
      setPalette({ top: rect.bottom+4, left: Math.max(4, Math.min(rect.left, window.innerWidth-180)) });
    } else {
      setPalette(null);
    }
  };

  const applyColor = (color) => {
    if(!ref.current) return;
    ref.current.focus();
    try{
      if(color){
        document.execCommand("styleWithCSS", false, true);
        document.execCommand("foreColor", false, color);
      } else {
        document.execCommand("removeFormat");
      }
    }catch(e){}
    handleInput();
    setPalette(null);
  };

  const effBg = (style.bg) || cellBg || "";
  const textColor = style.color ? effectiveTextColor(style.color, effBg) : undefined;

  return (
    <div className="relative flex-1" style={{minWidth:"90px"}}>
      <div ref={ref} contentEditable suppressContentEditableWarning dir="auto"
        onInput={handleInput} onMouseUp={checkSelection} onKeyUp={checkSelection}
        onBlur={()=>setTimeout(()=>setPalette(null), 150)}
        className={`w-full outline-none px-2 py-1 leading-snug rounded min-h-[1.6em] ${item.done?"line-through opacity-50":""}`}
        style={{ fontWeight: style.bold?700:400, color: textColor||"inherit", backgroundColor: style.bg || cellBg || "transparent" }} />
      {!item.text && !item.html && <div className="absolute top-1 px-2 text-sm opacity-40 pointer-events-none" style={{[dir==="rtl"?"right":"left"]:0}}>{t.task}</div>}
      {palette && createPortal(
        <div className="fixed z-[999] flex gap-1 p-1 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded shadow-xl" style={{top:palette.top, left:palette.left}}>
          {COLOR_SWATCHES.map((c,i)=>(
            <button key={i} onMouseDown={(e)=>{e.preventDefault(); applyColor(c);}} title={c||t.reset}
              className="w-5 h-5 rounded-full border border-slate-400 flex-shrink-0" style={{background:c||"transparent"}} />
          ))}
        </div>, document.body)}
    </div>
  );
}

  pool:{key:"pool"}, fastDoing:{key:"fastDoing"}, newTasks:{key:"newTasks"}, scheduled:{key:"scheduled"},
  homeBefore:{section:"homeBefore"}, toWork:{section:"toWork"}, fromWork:{section:"fromWork"}, homeAfter:{section:"homeAfter"},

function startRowDrag(e, fromIndex, onDrop, rowEl){
  if(!rowEl) return;
  e.preventDefault();
  const handle = e.currentTarget;
  try{ handle.setPointerCapture(e.pointerId); }catch(err){}
  const rect = rowEl.getBoundingClientRect();
  const clone = rowEl.cloneNode(true);
  clone.style.position = "fixed";
  clone.style.left = rect.left+"px";
  clone.style.top = rect.top+"px";
  clone.style.width = rect.width+"px";
  clone.style.zIndex = 9999;
  clone.style.pointerEvents = "none";
  clone.style.opacity = "0.9";
  clone.style.boxShadow = "0 6px 16px rgba(0,0,0,0.35)";
  clone.style.borderRadius = "6px";
  const bg = getComputedStyle(rowEl).backgroundColor;
  clone.style.background = (bg && bg!=="rgba(0, 0, 0, 0)") ? bg : (document.documentElement.classList.contains("dark") ? "#1e293b" : "#ffffff");
  document.body.appendChild(clone);
  rowEl.style.visibility = "hidden";
  const offsetY = e.clientY - rect.top;
  const offsetX = e.clientX - rect.left;
  let lastHighlight = null;

  const onMove = (ev) => {
    if(ev.cancelable) ev.preventDefault();
    clone.style.top = (ev.clientY - offsetY) + "px";
    clone.style.left = (ev.clientX - offsetX) + "px";
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const row = el && el.closest("[data-row-index]");
    if(lastHighlight && lastHighlight!==row){ lastHighlight.style.boxShadow=""; lastHighlight=null; }
    if(row && row!==rowEl){
      const r2 = row.getBoundingClientRect();
      const after = ev.clientY > r2.top + r2.height/2;
      row.style.boxShadow = after ? "inset 0 -3px 0 0 #6366f1" : "inset 0 3px 0 0 #6366f1";
      lastHighlight = row;
    }
  };
  const cleanup = () => {
    handle.removeEventListener("pointermove", onMove);
    handle.removeEventListener("pointerup", onUp);
    handle.removeEventListener("pointercancel", onUp);
    try{ handle.releasePointerCapture(e.pointerId); }catch(err){}
    clone.remove();
    rowEl.style.visibility = "";
    if(lastHighlight) lastHighlight.style.boxShadow = "";
  };
  const onUp = (ev) => {
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const panelEl = el && el.closest("[data-panel-id]");
    const row = el && el.closest("[data-row-index]");
    cleanup();
    if(!panelEl) return;
    const targetPanelId = panelEl.getAttribute("data-panel-id");
    const targetListPath = PANEL_LIST_MAP[targetPanelId];
    if(!targetListPath) return;
    let toIndex;
    if(row && row.closest("[data-panel-id]")===panelEl){
      const targetIndex = parseInt(row.getAttribute("data-row-index"),10);
      const r2 = row.getBoundingClientRect();
      const after = ev.clientY > r2.top + r2.height/2;
      toIndex = targetIndex + (after?1:0);
    } else {
      toIndex = Infinity;
    }
    onDrop(fromIndex, toIndex, targetListPath);
  };
  handle.addEventListener("pointermove", onMove);
  handle.addEventListener("pointerup", onUp);
  handle.addEventListener("pointercancel", onUp);
}

/* ---------------- responsive device detection ---------------- */
function useDevice(){
  const measure = () => {
    const w = typeof window!=="undefined" ? window.innerWidth : 1200;
    const h = typeof window!=="undefined" ? window.innerHeight : 800;
    // Breakpoints optimised for Note 8 portrait(412px), Note 8 landscape(~732px), tablet, desktop
    let bp = "xl";
    if(w < 480) bp = "xs";          // very small phone
    else if(w < 640) bp = "sm";     // phone portrait (Note 8 ~412px)
    else if(w < 900) bp = "md";     // phone landscape / small tablet (Note 8 landscape ~732px)
    else if(w < 1280) bp = "lg";    // large tablet / laptop
    // else xl = desktop
    const isTouch = typeof window!=="undefined" && (('ontouchstart' in window) || navigator.maxTouchPoints>0);
    const isPortrait = h > w;
    return { bp, isTouch, isPortrait, w, h };
  };
  const [dev, setDev] = useState(measure);
  useEffect(()=>{
    const update = () => setDev(measure());
    window.addEventListener("resize", update);
    window.addEventListener("orientationchange", update);
    return ()=>{ window.removeEventListener("resize", update); window.removeEventListener("orientationchange", update); };
  }, []);
  return {
    ...dev,
    isMobile: dev.bp==="xs" || dev.bp==="sm",          // single-column, bottom nav
    isTablet: dev.bp==="md",                            // 2-column grid
    isDesktop: dev.bp==="lg" || dev.bp==="xl",          // free canvas
    isCompact: dev.bp==="xs" || dev.bp==="sm" || dev.bp==="md",  // any non-desktop
  };
}
const IS_TOUCH = typeof window!=="undefined" && (('ontouchstart' in window) || navigator.maxTouchPoints>0);


function useMarquee(panelId, onMarqueeSelect, enabled){
  const bodyRef = useRef(null);
  const [marquee, setMarquee] = useState(null);
  const onBodyPointerDown = (e) => {
    if(!enabled) return;
    if(e.button!==undefined && e.button!==0) return;
    if(e.target.closest("button,input,textarea,[data-row-index]")) return;
    const body = bodyRef.current;
    if(!body) return;
    const rect = body.getBoundingClientRect();
    const startClientX = e.clientX, startClientY = e.clientY;
    const startX = startClientX-rect.left+body.scrollLeft, startY = startClientY-rect.top+body.scrollTop;
    setMarquee({x:startX,y:startY,w:0,h:0});
    const onMove = (ev) => {
      const cx = ev.clientX-rect.left+body.scrollLeft, cy = ev.clientY-rect.top+body.scrollTop;
      setMarquee({x:Math.min(startX,cx), y:Math.min(startY,cy), w:Math.abs(cx-startX), h:Math.abs(cy-startY)});
    };
    const onUp = (ev) => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      const mx1=Math.min(startClientX,ev.clientX), mx2=Math.max(startClientX,ev.clientX);
      const my1=Math.min(startClientY,ev.clientY), my2=Math.max(startClientY,ev.clientY);
      const rows = body.querySelectorAll("[data-item-id]");
      const ids=[];
      rows.forEach(r=>{
        const rr=r.getBoundingClientRect();
        if(rr.left<mx2 && rr.right>mx1 && rr.top<my2 && rr.bottom>my1) ids.push(r.getAttribute("data-item-id"));
      });
      if(ids.length) onMarqueeSelect(panelId, ids, ev.shiftKey);
      else if(!ev.shiftKey) onMarqueeSelect(null, [], false);
      setMarquee(null);
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  };
  return { bodyRef, marquee, onBodyPointerDown };
}

/* ---------------- resolve panel overlaps ---------------- */
function resolveOverlaps(rects, gap=16){
  const rs = rects.map(r=>({...r}));
  for(let iter=0; iter<20; iter++){
    let changed=false;
    for(let i=0; i<rs.length; i++){
      for(let j=i+1; j<rs.length; j++){
        const a=rs[i], b=rs[j];
        const ox = Math.min(a.x+a.w+gap, b.x+b.w+gap) - Math.max(a.x, b.x);
        const oy = Math.min(a.y+a.h+gap, b.y+b.h+gap) - Math.max(a.y, b.y);
        if(ox>0 && oy>0){
          if(ox<=oy){ b.x += ox; } else { b.y += oy; b.y=Math.max(0,b.y); }
          changed=true;
        }
      }
    }
    if(!changed) break;
  }
  return rs;
}

/* ---------------- draggable / resizable / colorable panel (free canvas, no-overlap) ---------------- */
const SNAP = 8;
function PanelBox({ id, title, actions, render, layout, onResize, onColor, onMovePanel, onZShift, siblings, setGuides, onMarqueeSelect, onSelectAll, tab, t }) {
  const colors = layout.colors[id] || {};
  const size = layout.sizes[id] || {w:360,h:340};
  const pos = layout.positions[id] || {x:0,y:0};
  const z = layout.zIndex[id] || 1;
  const wrapRef = useRef(null);
  const isSelectable = !!PANEL_LIST_MAP[id];
  const panelBg = colors.panelBg || "";
  const cellBg = colors.cellBg || "";
  const panelTextColor = panelBg ? contrastColor(panelBg) : undefined;
  const cellTextColor = cellBg ? contrastColor(cellBg) : panelTextColor;
  const { bodyRef, marquee, onBodyPointerDown } = useMarquee(id, onMarqueeSelect, isSelectable);

  const handlePointerDown = (e) => {
    if(e.button!==undefined && e.button!==0) return;
    e.preventDefault();
    const el = wrapRef.current;
    if(!el) return;
    el.setPointerCapture && el.setPointerCapture(e.pointerId);
    const startX = e.clientX, startY = e.clientY;
    const origX = pos.x, origY = pos.y;
    onZShift(id, "front");
    const w = size.w, h = size.h;
    const onMove = (ev) => {
      let nx = origX + (ev.clientX-startX);
      let ny = Math.max(0, origY + (ev.clientY-startY));
      let vGuide=null, hGuide=null;
      const myEdgesX = [nx, nx+w/2, nx+w];
      const myEdgesY = [ny, ny+h/2, ny+h];
      siblings.forEach(s=>{
        const sEdgesX = [s.x, s.x+s.w/2, s.x+s.w];
        const sEdgesY = [s.y, s.y+s.h/2, s.y+s.h];
        myEdgesX.forEach((mx,mi)=>{ sEdgesX.forEach(sx=>{ if(vGuide===null && Math.abs(mx-sx)<SNAP){ const delta=sx-mx; nx+=delta; vGuide=sx; } }); });
        myEdgesY.forEach((my,mi)=>{ sEdgesY.forEach(sy=>{ if(hGuide===null && Math.abs(my-sy)<SNAP){ const delta=sy-my; ny+=delta; hGuide=sy; } }); });
      });
      ny = Math.max(0,ny);
      el.style.left = nx+"px";
      el.style.top = ny+"px";
      setGuides({v:vGuide, h:hGuide});
    };
    const onUp = (ev) => {
      el.removeEventListener("pointermove", onMove);
      el.removeEventListener("pointerup", onUp);
      el.removeEventListener("pointercancel", onUp);
      setGuides({v:null,h:null});
      const finalX = parseFloat(el.style.left)||0;
      const finalY = parseFloat(el.style.top)||0;
      onMovePanel(id, finalX, finalY, tab);
    };
    el.addEventListener("pointermove", onMove);
    el.addEventListener("pointerup", onUp);
    el.addEventListener("pointercancel", onUp);
  };

  const handleResizeEnd = () => {
    const el = wrapRef.current;
    if(!el) return;
    let w = Math.max(240, el.offsetWidth), h = Math.max(120, el.offsetHeight);
    const oldW = size.w, oldH = size.h;
    const gap = 12;
    const pushed = [];
    if(w>oldW || h>oldH){
      const newRight = pos.x+w, newBottom = pos.y+h;
      siblings.forEach(s=>{
        const overlapsNew = s.x < newRight && s.x+s.w > pos.x && s.y < newBottom && s.y+s.h > pos.y;
        const overlappedOld = s.x < pos.x+oldW && s.x+s.w > pos.x && s.y < pos.y+oldH && s.y+s.h > pos.y;
        if(overlapsNew && !overlappedOld){
          let newX = s.x, newY = s.y;
          if(w>oldW && s.x+s.w > pos.x+oldW) newX = newRight+gap;
          if(h>oldH && s.y+s.h > pos.y+oldH) newY = newBottom+gap;
          if(newX!==s.x || newY!==s.y) pushed.push({id:s.id, x:newX, y:newY});
        }
      });
    }
    el.style.width = w+"px";
    el.style.height = h+"px";
    onResize(id, w, h, pushed, tab);
  };

  return (
    <div ref={wrapRef} data-panel-id={id}
      onMouseUp={handleResizeEnd}
      style={{ position:"absolute", left:pos.x+"px", top:pos.y+"px", zIndex:z,
        resize:"both", overflow:"auto", width: size.w+"px", height: size.h+"px", minWidth:240, minHeight:120,
        backgroundColor: panelBg || undefined, color: panelTextColor }}
      className={`border border-slate-300 dark:border-slate-700 rounded-xl flex flex-col shadow-sm ${panelBg?"":"bg-white/60 dark:bg-slate-900/60"}`}>
      <div onPointerDown={handlePointerDown}
        onContextMenu={(e)=>{ e.preventDefault(); if(onSelectAll) onSelectAll(id); }}
        style={{touchAction:"none", backgroundColor: panelBg||undefined, color: panelTextColor}}
        className={`px-3 py-2 font-semibold text-sm flex items-center justify-between gap-2 flex-wrap cursor-move select-none flex-shrink-0 rounded-t-xl ${panelBg?"":"bg-slate-100 dark:bg-slate-800"}`}>
        <span className="flex items-center gap-1">
          <span className="opacity-40 cursor-move" title={t.dragHint}>⠿</span>
          {title}
        </span>
        <div className="flex gap-1 items-center" onPointerDown={(e)=>e.stopPropagation()}>{actions}<PanelColorMenu colors={colors} onChange={(patch)=>onColor(id,patch)} t={t} /></div>
      </div>
      <div ref={bodyRef} onPointerDown={onBodyPointerDown} className="p-2 flex flex-col gap-0.5 overflow-y-auto flex-1 relative" style={{ backgroundColor: cellBg||undefined, color: cellTextColor }}>
        {render(cellBg, cellTextColor)}
        {marquee && <div style={{position:"absolute", left:marquee.x, top:marquee.y, width:marquee.w, height:marquee.h, border:"1px dashed #6366f1", background:"rgba(99,102,241,0.1)", pointerEvents:"none", zIndex:50}} />}
      </div>
    </div>
  );
}

function PanelGrid({ tab, panels, layout, onResize, onColor, onMovePanel, onZShift, onMarqueeSelect, onSelectAll, focusPanels, device, t }) {
  const order = (layout.order[tab] && layout.order[tab].length) ? layout.order[tab] : panels.map(p=>p.id);
  const byId = {}; panels.forEach(p=>byId[p.id]=p);
  const [guides,setGuides] = useState({v:null,h:null});
  const { isMobile, isTablet, isDesktop } = device || {isDesktop:true};

  // Focus mode: only show selected panels, centered
  const activeOrder = (focusPanels && focusPanels.size>0)
    ? order.filter(id=>byId[id] && focusPanels.has(id))
    : order.filter(id=>byId[id]);

  if(isMobile){
    return (
      <div className="flex flex-col gap-2 pb-24 safe-bottom">
        {activeOrder.map(id=>{
          const p = byId[id];
          return <PanelBoxMobile key={id} id={id} title={p.title} actions={p.actions} render={p.render}
            layout={layout} onColor={onColor} onMarqueeSelect={onMarqueeSelect} t={t} />;
        })}
      </div>
    );
  }

  if(isTablet){
    return (
      <div className="grid gap-3" style={{gridTemplateColumns:"1fr 1fr"}}>
        {activeOrder.map(id=>{
          const p = byId[id];
          return <PanelBoxTablet key={id} id={id} title={p.title} actions={p.actions} render={p.render}
            layout={layout} onColor={onColor} onMarqueeSelect={onMarqueeSelect} t={t} />;
        })}
      </div>
    );
  }

  // Focus mode on desktop: show selected panels side by side, centered, no absolute positioning
  if(focusPanels && focusPanels.size>0){
    return (
      <div className="flex flex-wrap gap-4 justify-center pt-2">
        {activeOrder.map(id=>{
          const p = byId[id];
          const size = layout.sizes[id] || {w:500,h:400};
          return (
            <div key={id} style={{width:Math.max(360,size.w), minHeight:size.h}}>
              <PanelBoxTablet id={id} title={p.title} actions={p.actions} render={p.render}
                layout={layout} onColor={onColor} onMarqueeSelect={onMarqueeSelect} t={t} />
            </div>
          );
        })}
      </div>
    );
  }

  // Normal desktop: free canvas
  let maxBottom = 0, maxRight = 0;
  const allRects = {};
  order.filter(id=>byId[id]).forEach(id=>{
    const pos = layout.positions[id] || {x:0,y:0};
    const size = layout.sizes[id] || {w:360,h:340};
    allRects[id] = {x:pos.x,y:pos.y,w:size.w,h:size.h,id};
    maxBottom = Math.max(maxBottom, pos.y+size.h);
    maxRight = Math.max(maxRight, pos.x+size.w);
  });

  return (
    <div className="relative" style={{direction:"ltr", minHeight:(maxBottom+24)+"px", minWidth:(maxRight+24)+"px"}}>
      {guides.v!=null && <div style={{position:"absolute", left:guides.v, top:0, height:"100%", width:"2px", background:"#6366f1", zIndex:9998, pointerEvents:"none"}} />}
      {guides.h!=null && <div style={{position:"absolute", top:guides.h, left:0, width:"100%", height:"2px", background:"#6366f1", zIndex:9998, pointerEvents:"none"}} />}
      {activeOrder.map(id=>{
        const p = byId[id];
        const siblings = order.filter(oid=>oid!==id && byId[oid]).map(oid=>allRects[oid]);
        return <PanelBox key={id} id={id} title={p.title} actions={p.actions} render={p.render}
          layout={layout} onResize={onResize} onColor={onColor}
          onMovePanel={onMovePanel} onZShift={(pid,dir)=>onZShift(tab,pid,dir)} siblings={siblings} setGuides={setGuides} onMarqueeSelect={onMarqueeSelect} onSelectAll={onSelectAll} tab={tab} t={t} />;
      })}
    </div>
  );
}

          <div className="text-[11px] opacity-60 mt-1">{he?"הנתונים ישמרו ב-OneDrive/Apps/MyDailySchedule/daily-schedule.json":"Data saved to OneDrive/Apps/MyDailySchedule/daily-schedule.json"}</div>
        </div>

        <div className="flex gap-2">
          <button onClick={()=>{ localStorage.setItem("od_clientId", cid.trim()); onClientIdSave(cid.trim()); onClose(); }}
            className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold">
            {he?"שמור והתחבר":"Save & Connect"}
          </button>
          {currentClientId && (
            <button onClick={()=>{ localStorage.removeItem("od_clientId"); onClientIdSave(""); onClose(); }}
              className="px-4 py-2 border border-red-400 text-red-600 rounded-lg">
              {he?"נתק":"Disconnect"}
            </button>
          )}
        </div>
      </div>
    </div>, document.body);
}

function App() {
  const device = useDevice();
  const { isMobile, isTablet, isDesktop, isCompact, isTouch } = device;
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  /* ── OneDrive state ── */
  const [odClientId, setOdClientId] = useState(()=>localStorage.getItem("od_clientId")||"");
  const [odStatus, setOdStatus] = useState("idle"); // idle|connecting|connected|saving|error|disconnected
  const [odAccount, setOdAccount] = useState(null);
  const [showOdSettings, setShowOdSettings] = useState(false);
  const msalRef = useRef(null);
  const odSaveTimerRef = useRef(null);
  const odLastWrittenRef = useRef(null);
  const [data, setData] = useState(loadLocalData);
  const [date, setDate] = useState(todayStr());
  useEffect(()=>{ checkWaitingTasks(); }, []); // eslint-disable-line

  // Auto-transfer: runs on load AND at 23:00 every minute
  // Catches up missed transfers from previous days
  const doAutoTransfer = (fromDate, toDate) => {
    setData(d=>{
      const fromDay = d.daily[fromDate];
      if(!fromDay) return d;
      const panels = ['pool','fastDoing','scheduled','newTasks'];
      const sections = ['homeBefore','toWork','fromWork','homeAfter'];
      // collect all unfinished tasks from fromDate
      const toMove = [];
      panels.forEach(key=>(fromDay[key]||[]).forEach(i=>{ if(!i.done) toMove.push({...i, id:uid()}); }));
      sections.forEach(sec=>((fromDay.sections||{})[sec]||[]).forEach(i=>{ if(!i.done) toMove.push({...i, id:uid()}); }));
      if(toMove.length===0) return d;
      const nd = JSON.parse(JSON.stringify(d));
      // clear unfinished from source date
      panels.forEach(key=>{ nd.daily[fromDate][key]=(nd.daily[fromDate][key]||[]).filter(i=>i.done); });
      sections.forEach(sec=>{ if(nd.daily[fromDate].sections?.[sec]) nd.daily[fromDate].sections[sec]=nd.daily[fromDate].sections[sec].filter(i=>i.done); });
      // add to pool of toDate
      if(!nd.daily[toDate]) nd.daily[toDate]=emptyDay();
      nd.daily[toDate].pool=[...toMove, ...(nd.daily[toDate].pool||[])];
      return nd;
    });
  };

  useEffect(()=>{
    // On load: check last 3 days for missed transfers
    const today = todayStr();
    for(let i=1; i<=3; i++){
      const pastDate = addDays(today, -i);
      doAutoTransfer(pastDate, today);
    }
  }, []); // eslint-disable-line

  // Also check every minute at 23:00
  useEffect(()=>{
    const check = () => {
      const now = new Date();
      if(now.getHours()===23 && now.getMinutes()===0){
        const today = todayStr();
        const tomorrow = addDays(today, 1);
        doAutoTransfer(today, tomorrow);
      }
    };
    check();
    const iv = setInterval(check, 60000);
    return ()=>clearInterval(iv);
  }, []); // eslint-disable-line

  /* ── OneDrive: init MSAL and handle redirect ── */
  useEffect(()=>{
    if(!odClientId) return;
    const instance = buildMsal(odClientId);
    if(!instance){ setOdStatus("error"); return; }
    msalRef.current = instance;
    setOdStatus("connecting");
    instance.handleRedirectPromise().then(result=>{
      if(result) {
        setOdAccount(result.account);
        setOdStatus("connected");
        odLoadFromOneDrive(instance);
      } else {
        const accounts = instance.getAllAccounts();
        if(accounts.length){ setOdAccount(accounts[0]); setOdStatus("connected"); odLoadFromOneDrive(instance); }
        else setOdStatus("idle");
      }
    }).catch(e=>{ console.error("MSAL redirect:",e); setOdStatus("error"); });
  }, [odClientId]);

  const odLoadFromOneDrive = async (instance) => {
    try {
      setOdStatus("connecting");
      const token = await odGetToken(instance);
      if(!token){ setOdStatus("idle"); return; }
      const remote = await odReadFile(token);
      if(remote){
        const normalized = normalizeData(remote);
        const remoteStr = JSON.stringify(normalized);
        if(remoteStr !== odLastWrittenRef.current){
          undoingRef.current = true;
          setData(normalized);
          odLastWrittenRef.current = remoteStr;
        }
      }
      setOdStatus("connected");
    } catch(e){ console.error("OneDrive load:",e); setOdStatus("error"); }
  };

  const odConnectLogin = async () => {
    const instance = msalRef.current || buildMsal(odClientId);
    if(!instance){ setShowOdSettings(true); return; }
    msalRef.current = instance;
    setOdStatus("connecting");
    try {
      const result = await instance.loginPopup({ scopes:OD_SCOPES });
      setOdAccount(result.account);
      setOdStatus("connected");
      odLoadFromOneDrive(instance);
    } catch(e){ console.error("Login:",e); setOdStatus("error"); }
  };

  const odDisconnect = () => {
    if(msalRef.current && odAccount){
      msalRef.current.logoutPopup({account:odAccount}).catch(()=>{});
    }
    setOdAccount(null); setOdStatus("idle");
  };
  const [tab, setTab] = useState("daily");
  const [newTaskDraft, setNewTaskDraft] = useState("");
  const [matchWarning, setMatchWarning] = useState(null);
  const [poolSortDir, setPoolSortDir] = useState(1);
  const [selection, setSelection] = useState(new Set());
  const toggleSelect = (key) => setSelection(prev=>{ const n=new Set(prev); if(n.has(key)) n.delete(key); else n.add(key); return n; });
  const onMarqueeSelect = (panelId, ids, additive) => {
    setSelection(prev=>{
      const next = additive ? new Set(prev) : new Set();
      if(panelId) ids.forEach(i=>next.add(`${panelId}::${i}`));
      return next;
    });
  };
  // SELECT ALL unfinished tasks in a panel
  const onSelectAll = (panelId) => {
    const listPath = PANEL_LIST_MAP[panelId];
    if(!listPath) return;
    const list = listPath.inventory ? (data.inventory[listPath.inventory]||[])
      : listPath.custom ? (day.custom?.[listPath.custom]||[])
      : listPath.section ? day.sections[listPath.section]
      : day[listPath.key];
    const unfinished = (list||[]).filter(i=>!i.done);
    setSelection(prev=>{
      const next = new Set(prev);
      unfinished.forEach(i=>next.add(`${panelId}::${i.id}`));
      return next;
    });
  };
  const [history, setHistory] = useState([]);
  const [redoStack, setRedoStack] = useState([]);
  const prevRef = useRef(data);
  const undoingRef = useRef(false);
  const redoingRef = useRef(false);
  const [focusNewItemId, setFocusNewItemId] = useState(null);
  const [focusPanels, setFocusPanels] = useState(new Set()); // panels to focus on
  const [showFocusMenu, setShowFocusMenu] = useState(false); // focus menu open?
  const [showDoneScheduled, setShowDoneScheduled] = useState(false); // show/hide done in scheduled
  // Double-right-click selection (click twice within 400ms = toggle select)
  const lastRClickRef = useRef({id:null, time:0});

  /* ── Sync state (OneDrive only, no Firebase) ── */
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|saving|synced|error|offline
  const dataRef = useRef(data);
  useEffect(()=>{ dataRef.current = data; }, [data]);

  /* ── Data change effect: localStorage cache + OneDrive auto-save ── */
  useEffect(()=>{
    if(undoingRef.current){ undoingRef.current=false; prevRef.current=data; saveLocalData(data); return; }
    if(redoingRef.current){ redoingRef.current=false; prevRef.current=data; saveLocalData(data); return; }
    setRedoStack([]);
    setHistory(h=>{ const nh=[...h, prevRef.current]; return nh.length>50 ? nh.slice(nh.length-50) : nh; });
    prevRef.current = data;
    saveLocalData(data); // always save locally first (instant, offline-safe)
    // OneDrive auto-save (debounced 5s)
    if(odStatus==="connected" && msalRef.current){
      if(odSaveTimerRef.current) clearTimeout(odSaveTimerRef.current);
      setSyncStatus("saving");
      odSaveTimerRef.current = setTimeout(async()=>{
        try {
          const toWrite = dataRef.current;
          const toWriteStr = JSON.stringify(toWrite);
          if(toWriteStr === odLastWrittenRef.current) { setSyncStatus("synced"); return; }
          const token = await odGetToken(msalRef.current);
          if(!token){ setSyncStatus("error"); return; }
          await graphPut(token, odFilePath(HAITHAM_APPS.FILES.dailySchedule), toWrite);
          odLastWrittenRef.current = toWriteStr;
          setSyncStatus("synced");
        } catch(e){ console.error("OneDrive save:",e); setSyncStatus("error"); }
      }, 5000);
    }
  }, [data]);

  const undo = () => {
    setHistory(h=>{
      if(h.length===0) return h;
      const prev = h[h.length-1];
      setRedoStack(r=>{ const nr=[...r, dataRef.current]; return nr.length>50?nr.slice(nr.length-50):nr; });
      undoingRef.current = true;
      setData(prev);
      return h.slice(0,-1);
    });
  };

  const redo = () => {
    setRedoStack(r=>{
      if(r.length===0) return r;
      const next = r[r.length-1];
      setHistory(h=>{ const nh=[...h, dataRef.current]; return nh.length>50?nh.slice(nh.length-50):nh; });
      redoingRef.current = true;
      setData(next);
      return r.slice(0,-1);
    });
  };

  useEffect(()=>{
    const onKey=(e)=>{
      if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z" && !e.shiftKey){ e.preventDefault(); undo(); }
      if((e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==="y" || (e.key.toLowerCase()==="z" && e.shiftKey))){ e.preventDefault(); redo(); }
    };
    window.addEventListener("keydown", onKey);
    return ()=>window.removeEventListener("keydown", onKey);
  }, []);

  const lang = data.settings.lang;
  const t = DICT[lang];
  const dir = "ltr";
  const dark = data.settings.dark;

  const [searchQuery, setSearchQuery] = useState("");
  const [showSearch, setShowSearch] = useState(false);
  const [showUndoMenu, setShowUndoMenu] = useState(false);
  const [showRedoMenu, setShowRedoMenu] = useState(false);
  const [highlightTarget, setHighlightTarget] = useState(null);
  const searchResults = searchQuery.trim().length>=2 ? searchAll(data, searchQuery, t) : [];
  useEffect(()=>{
    if(!highlightTarget) return;
    const tm = setTimeout(()=>setHighlightTarget(null), 3000);
    return ()=>clearTimeout(tm);
  }, [highlightTarget]);
  const goToResult = (r) => {
    if(r.tabTarget==="daily") setDate(r.date);
    setTab(r.tabTarget);
    setHighlightTarget({panelId:r.panelId, itemId:r.itemId});
    setSearchQuery("");
    setShowSearch(false);
  };
  const layout = data.layout;
  const setSettings = (patch)=>setData(d=>({...d,settings:{...d.settings,...patch}}));

  const onMovePanel = (id, x, y, tabKey) => setData(d=>{
    const newPositions = {...d.layout.positions, [id]:{x,y}};
    const order = d.layout.order[tabKey||"daily"] || [];
    const rects = order.map(pid=>({ id:pid, x:(newPositions[pid]||{x:0}).x, y:(newPositions[pid]||{y:0}).y, w:(d.layout.sizes[pid]||{w:360}).w, h:(d.layout.sizes[pid]||{h:300}).h }));
    const resolved = resolveOverlaps(rects);
    resolved.forEach(r=>{ newPositions[r.id]={x:r.x,y:r.y}; });
    return {...d, layout:{...d.layout, positions:newPositions}};
  });
  const onZShift = (tabKey, id, dir) => {
    setData(d=>{
      const order = d.layout.order[tabKey] || [];
      const cur = d.layout.zIndex || {};
      let maxZ = 1, minZ = 1;
      order.forEach(pid=>{ const z=cur[pid]||1; if(z>maxZ) maxZ=z; if(z<minZ) minZ=z; });
      const newZ = dir==="front" ? maxZ+1 : minZ-1;
      return { ...d, layout:{...d.layout, zIndex:{...cur,[id]:newZ}} };
    });
  };
  const onResize = (id, w, h, pushed=[], tabKey) => setData(d=>{
    let positions = {...d.layout.positions};
    if(pushed && pushed.length) pushed.forEach(p=>{ positions[p.id]={x:p.x,y:p.y}; });
    const sizes = {...d.layout.sizes, [id]:{w,h}};
    // Only resolve overlaps within the SAME tab to avoid pushing other tabs off-screen
    const currentTab = tabKey || Object.keys(d.layout.order).find(t=>(d.layout.order[t]||[]).includes(id)) || "daily";
    const order = d.layout.order[currentTab] || [];
    const rects = order.filter(pid=>positions[pid]).map(pid=>({ id:pid, x:positions[pid].x, y:positions[pid].y, w:(sizes[pid]||{w:360}).w, h:(sizes[pid]||{h:300}).h }));
    const resolved = resolveOverlaps(rects);
    resolved.forEach(r=>{ positions[r.id]={x:r.x,y:r.y}; });
    return { ...d, layout:{ ...d.layout, sizes, positions } };
  });
  const onColor = (id, patch) => setData(d=>({...d, layout:{...d.layout, colors:{...d.layout.colors,[id]:{...(d.layout.colors[id]||{}),...patch}}}}));

  const getDay = (dt)=>data.daily[dt] || emptyDay();
  const updateDay = (dt,patch)=>setData(d=>({...d,daily:{...d.daily,[dt]:{...getDay(dt),...patch}}}));
  const day = getDay(date);

  const setList = (listPath, list) => {
    if(listPath.inventory){ setData(d=>({...d, inventory:{...d.inventory, [listPath.inventory]: list}})); return; }
    if(listPath.custom){ updateDay(date, {custom:{...day.custom, [listPath.custom]: list}}); return; }
    if (listPath.section) updateDay(date, { sections: { ...day.sections, [listPath.section]: list } });
    else updateDay(date, { [listPath.key]: list });
  };
  const getList = (listPath) => listPath.inventory ? (data.inventory[listPath.inventory]||[]) : listPath.custom ? (day.custom?.[listPath.custom]||[]) : (listPath.section ? day.sections[listPath.section] : day[listPath.key]);
  const addItem = (listPath, extra={}) => {
    const task = newTask(extra);
    setFocusNewItemId(task.id);
    setList(listPath, [...getList(listPath), task]);
  };
  const updateItem = (listPath, item) => setList(listPath, getList(listPath).map(i=>i.id===item.id?item:i));
  const deleteItem = (listPath, id) => setList(listPath, getList(listPath).filter(i=>i.id!==id));
  const samePath = (a,b) => (a.key===b.key) && (a.section===b.section) && (a.inventory===b.inventory);
  const moveTaskAcross = (fromPath, fromIndex, toPath, toIndex) => {
    const fromList = [...getList(fromPath)];
    const moved = fromList[fromIndex];
    if(!moved) return;
    if(samePath(fromPath,toPath)){
      const list = [...fromList];
      list.splice(fromIndex,1);
      const to = Math.min(Math.max(toIndex,0), list.length);
      list.splice(to,0,moved);
      setList(fromPath, list);
      return;
    }
    const newFrom = [...fromList]; newFrom.splice(fromIndex,1);
    const toListCurr = [...getList(toPath)];
    const to = Math.min(Math.max(toIndex,0), toListCurr.length);
    toListCurr.splice(to,0,moved);
    if(fromPath.inventory || toPath.inventory){
      setData(d=>{
        let nd = { ...d, inventory:{...d.inventory}, daily:{...d.daily} };
        const applyAny = (path,val) => {
          if(path.inventory){ nd.inventory[path.inventory] = val; return; }
          const dy = nd.daily[date] || emptyDay();
          nd.daily[date] = path.section ? { ...dy, sections:{...dy.sections,[path.section]:val} } : { ...dy, [path.key]: val };
        };
        applyAny(fromPath, newFrom);
        applyAny(toPath, toListCurr);
        return nd;
      });
      return;
    }
    const newDay = {...day, sections:{...day.sections}};
    const apply=(path,val)=>{ if(path.section) newDay.sections[path.section]=val; else newDay[path.key]=val; };
    apply(fromPath,newFrom); apply(toPath,toListCurr);
    updateDay(date,newDay);
  };

  const moveTaskToDate = (listPath, itemId, targetDate) => {
    setData(d=>{
      const curDay = d.daily[date] || emptyDay();
      const list = listPath.section ? curDay.sections[listPath.section] : curDay[listPath.key];
      const item = (list||[]).find(i=>i.id===itemId);
      if(!item) return d;
      const newList = list.filter(i=>i.id!==itemId);
      const newCurDay = listPath.section
        ? { ...curDay, sections:{ ...curDay.sections, [listPath.section]: newList } }
        : { ...curDay, [listPath.key]: newList };
      const targetDay = d.daily[targetDate] || emptyDay();
      const newItem = { ...item, id: uid() };
      const newTargetDay = listPath.section
        ? { ...targetDay, sections:{ ...targetDay.sections, [listPath.section]: [...(targetDay.sections[listPath.section]||[]), newItem] } }
        : { ...targetDay, [listPath.key]: [...(targetDay[listPath.key]||[]), newItem] };
      return { ...d, daily:{ ...d.daily, [date]: newCurDay, [targetDate]: newTargetDay } };
    });
  };

  const moveManyToDate = (keys, targetDate) => {
    setData(d=>{
      const curDay = JSON.parse(JSON.stringify(d.daily[date] || emptyDay()));
      const targetDay = JSON.parse(JSON.stringify(d.daily[targetDate] || emptyDay()));
      keys.forEach(key=>{
        const sep = key.indexOf("::");
        const panelId = key.slice(0,sep), itemId = key.slice(sep+2);
        const listPath = PANEL_LIST_MAP[panelId];
        if(!listPath) return;
        const list = listPath.section ? curDay.sections[listPath.section] : curDay[listPath.key];
        if(!list) return;
        const idx = list.findIndex(i=>i.id===itemId);
        if(idx===-1) return;
        const item = list[idx];
        list.splice(idx,1);
        const newItem = { ...item, id: uid() };
        if(listPath.section) targetDay.sections[listPath.section] = [...(targetDay.sections[listPath.section]||[]), newItem];
        else targetDay[listPath.key] = [...(targetDay[listPath.key]||[]), newItem];
      });
      return { ...d, daily:{ ...d.daily, [date]: curDay, [targetDate]: targetDay } };
    });
    setSelection(new Set());
  };

  const moveTaskToInventory = (listPath, itemId) => {
    setData(d=>{
      const curDay = d.daily[date] || emptyDay();
      const list = listPath.section ? curDay.sections[listPath.section] : curDay[listPath.key];
      const item = (list||[]).find(i=>i.id===itemId);
      if(!item) return d;
      const newList = list.filter(i=>i.id!==itemId);
      const newCurDay = listPath.section
        ? { ...curDay, sections:{ ...curDay.sections, [listPath.section]: newList } }
        : { ...curDay, [listPath.key]: newList };
      const targetCat = (item.category && d.inventory[item.category]) ? item.category : "pool";
      const invItem = { id: uid(), text: item.text, dueDate: item.dueDate||"", priority:"", used:false };
      return { ...d, daily:{ ...d.daily, [date]: newCurDay }, inventory:{ ...d.inventory, [targetCat]: [...d.inventory[targetCat], invItem] } };
    });
  };

  const moveManyToInventory = (keys) => {
    setData(d=>{
      const curDay = JSON.parse(JSON.stringify(d.daily[date] || emptyDay()));
      const inventory = JSON.parse(JSON.stringify(d.inventory));
      keys.forEach(key=>{
        const sep = key.indexOf("::");
        const panelId = key.slice(0,sep), itemId = key.slice(sep+2);
        const listPath = PANEL_LIST_MAP[panelId];
        if(!listPath) return;
        const list = listPath.section ? curDay.sections[listPath.section] : curDay[listPath.key];
        if(!list) return;
        const idx = list.findIndex(i=>i.id===itemId);
        if(idx===-1) return;
        const item = list[idx];
        list.splice(idx,1);
        const targetCat = (item.category && inventory[item.category]) ? item.category : "pool";
        inventory[targetCat].push({ id: uid(), text:item.text, dueDate:item.dueDate||"", priority:"", used:false });
      });
      return { ...d, daily:{ ...d.daily, [date]: curDay }, inventory };
    });
    setSelection(new Set());
  };

  const deleteMany = (keys) => {
    setData(d=>{
      const curDay = JSON.parse(JSON.stringify(d.daily[date] || emptyDay()));
      keys.forEach(key=>{
        const sep = key.indexOf("::");
        const panelId = key.slice(0,sep), itemId = key.slice(sep+2);
        const listPath = PANEL_LIST_MAP[panelId];
        if(!listPath) return;
        const list = listPath.section ? curDay.sections[listPath.section] : curDay[listPath.key];
        if(!list) return;
        const idx = list.findIndex(i=>i.id===itemId);
        if(idx>-1) list.splice(idx,1);
      });
      return { ...d, daily:{ ...d.daily, [date]: curDay } };
    });
    setSelection(new Set());
  };
  const moveItem = (fromPath, toPath, id, extra={}) => {
    const fromList = getList(fromPath);
    const item = fromList.find(i=>i.id===id);
    if(!item) return;
    const merged = {...item, ...extra, id: uid()};
    if (toPath.section) {
      updateDay(date, { sections: { ...day.sections, [fromPath.section||""]: fromPath.section?fromList.filter(i=>i.id!==id):day.sections[fromPath.section||""], [toPath.section]: [...(day.sections[toPath.section]||[]), merged] }, ...(fromPath.key?{[fromPath.key]: fromList.filter(i=>i.id!==id)}:{}) });
    } else if (fromPath.section) {
      updateDay(date, { sections: { ...day.sections, [fromPath.section]: fromList.filter(i=>i.id!==id) }, [toPath.key]: [...day[toPath.key], merged] });
    } else {
      updateDay(date, { [fromPath.key]: fromList.filter(i=>i.id!==id), [toPath.key]: [...(day[toPath.key]||[]), merged] });
    }
  };

  const sortPoolToggle = (field) => {
    const list = [...day.pool].sort((a,b)=>{
      let av,bv;
      if(field==="task"){ av=a.text||""; bv=b.text||""; return poolSortDir*av.localeCompare(bv); }
      av=parseFloat(a[field])||0; bv=parseFloat(b[field])||0;
      return poolSortDir*(av-bv);
    });
    setList({key:"pool"}, list);
    setPoolSortDir(d=>-d);
  };

  const updateItemAndLog = (listPath, it, wasDone, source) => {
    setData(d=>{
      const day = d.daily[date] || emptyDay();
      const list = listPath.section ? day.sections[listPath.section] : day[listPath.key];
      const newList = (list||[]).map(i=>i.id===it.id?it:i);
      const newDay = listPath.section
        ? { ...day, sections:{ ...day.sections, [listPath.section]: newList } }
        : { ...day, [listPath.key]: newList };
      let archive = d.archive;
      if(it.done && !wasDone){
        archive = [...archive, {id:uid(), text:it.text, html:it.html||"", category:it.category||"other", date, completedAt:new Date().toISOString(), source}];
      }
      return { ...d, daily:{ ...d.daily, [date]: newDay }, archive };
    });
  };

  const restoreArchiveEntry = (entryId) => {
    setData(d=>{
      const entry = d.archive.find(a=>a.id===entryId);
      if(!entry) return d;
      const newArchive = d.archive.filter(a=>a.id!==entryId);
      const day = d.daily[date] || emptyDay();
      const target = entry.source==="scheduled" ? "scheduled" : "pool";
      const restored = newTask({ text: entry.text, html: entry.html||"", category: entry.category||"" });
      const newDay = { ...day, [target]: [...(day[target]||[]), restored] };
      return { ...d, archive:newArchive, daily:{ ...d.daily, [date]: newDay } };
    });
  };

  // Auto-transfer: tasks with active waiting whose dueDate <= today move to Scheduled of that date
  const checkWaitingTasks = () => {
    const today = todayStr();
    setData(d=>{
      const nd = JSON.parse(JSON.stringify(d));
      const panels = ['pool','fastDoing','scheduled','newTasks'];
      const sections = ['homeBefore','toWork','fromWork','homeAfter'];
      Object.keys(nd.daily).forEach(dt=>{
        const dy = nd.daily[dt];
        panels.forEach(key=>{
          (dy[key]||[]).forEach(item=>{
            const aw = (item.waitingLog||[]).find(w=>!w.resolved);
            if(!aw || aw.expectedDate>today || item.done) return;
            // resolve waiting
            item.waitingLog = item.waitingLog.map(w=>w.resolved?w:{...w,resolved:true,resolvedAt:today,autoResolved:true});
            // move to scheduled of expectedDate
            const tgt = aw.expectedDate;
            if(!nd.daily[tgt]) nd.daily[tgt] = emptyDay();
            const moved = {...item, id:uid()};
            nd.daily[tgt].scheduled = [...(nd.daily[tgt].scheduled||[]), moved];
            dy[key] = dy[key].filter(i=>i.id!==item.id);
          });
        });
        sections.forEach(sec=>{
          ((dy.sections||{})[sec]||[]).forEach(item=>{
            const aw = (item.waitingLog||[]).find(w=>!w.resolved);
            if(!aw || aw.expectedDate>today || item.done) return;
            item.waitingLog = item.waitingLog.map(w=>w.resolved?w:{...w,resolved:true,resolvedAt:today,autoResolved:true});
            const tgt = aw.expectedDate;
            if(!nd.daily[tgt]) nd.daily[tgt] = emptyDay();
            nd.daily[tgt].scheduled = [...(nd.daily[tgt].scheduled||[]), {...item,id:uid()}];
            dy.sections[sec] = dy.sections[sec].filter(i=>i.id!==item.id);
          });
        });
      });
      return nd;
    });
  };

  const archiveCountToday = data.archive.filter(a=>a.date===date).length;
  const last14 = Array.from({length:14},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-13+i); return d.toISOString().slice(0,10); });
  const completedByDay = last14.map(dt=>({ dt, count:data.archive.filter(a=>a.date===dt).length, label:new Date(dt+"T00:00").toLocaleDateString(lang==="he"?"he-IL":lang==="ar"?"ar":"en-US",{month:"short",day:"numeric"}) }));

  /* ---- panel definitions ---- */
  const dailyPanels = [
    { id:"pool", title:`${t.pool} (${day.pool.filter(i=>!i.done).length})`,

    { id:"newTasks", title:t.newTasks,

          <button onClick={()=>setShowDoneScheduled(s=>!s)}

  // Custom user-created daily sections

  });

  // Waiting For List: computed view of all active waiting tasks
  const allWaitingTasks = [];
  Object.keys(data.daily).sort().forEach(dt=>{
    const dy = data.daily[dt];
    ['pool','fastDoing','scheduled','newTasks'].forEach(key=>{
      (dy[key]||[]).forEach(item=>{
        const aw = (item.waitingLog||[]).find(w=>!w.resolved);
        if(aw) allWaitingTasks.push({item, date:dt, panel:key, aw});
      });
    });
    ['homeBefore','toWork','fromWork','homeAfter'].forEach(sec=>{
      ((dy.sections||{})[sec]||[]).forEach(item=>{
        const aw = (item.waitingLog||[]).find(w=>!w.resolved);
        if(aw) allWaitingTasks.push({item, date:dt, panel:sec, aw});
      });
    });

  dailyPanels.push({
    id:"waitingForList", title:`${t.waitingFor} (${allWaitingTasks.length})`, actions:null,
    render:(cellBg)=>(
      allWaitingTasks.length===0
        ? <div className="text-xs opacity-50 p-2">{lang==="he"?"אין משימות ממתינות":"No waiting tasks"}</div>
        : allWaitingTasks.map(({item,date:dt,panel,aw},i)=>(
          <WaitingRow key={item.id+i} item={item} dt={dt} panel={panel} aw={aw} lang={lang} t={t}
            onGoTo={()=>{ setDate(dt); setTab("daily"); }}
            onMoveToPool={(targetDate)=>{
              setData(d=>{
                const nd=JSON.parse(JSON.stringify(d));
                const srcDay=nd.daily[dt]||emptyDay();
                const panels2=['pool','fastDoing','scheduled','newTasks'];
                const sections=['homeBefore','toWork','fromWork','homeAfter'];
                let found=false;
                panels2.forEach(key=>{ if(found) return; const idx=(srcDay[key]||[]).findIndex(i=>i.id===item.id); if(idx>=0){ srcDay[key].splice(idx,1); found=true; } });
                sections.forEach(sec=>{ if(found) return; const idx=((srcDay.sections||{})[sec]||[]).findIndex(i=>i.id===item.id); if(idx>=0){ srcDay.sections[sec].splice(idx,1); found=true; } });
                const movedItem={...item, waitingLog:(item.waitingLog||[]).map(w=>w.resolved?w:{...w,resolved:true,resolvedAt:todayStr()})};
                if(!nd.daily[targetDate]) nd.daily[targetDate]=emptyDay();
                nd.daily[targetDate].pool=[...(nd.daily[targetDate].pool||[]),movedItem];
                nd.daily[dt]=srcDay;
                return nd;
              });
            }}
            onMoveToInventoryWaiting={()=>{
              setData(d=>{
                const nd=JSON.parse(JSON.stringify(d));
                const srcDay=nd.daily[dt]||emptyDay();
                const panels2=['pool','fastDoing','scheduled','newTasks'];
